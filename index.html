<!DOCTYPE html>
<html>
<head>
<title>Ek Baat Sunle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff6a88,#ff99ac);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* Floating Hearts */
.heart{
  position:absolute;
  bottom:-50px;
  font-size:22px;
  animation: floatUp linear infinite;
}

@keyframes floatUp{
  0%{transform: translateY(0); opacity:1;}
  100%{transform: translateY(-100vh); opacity:0;}
}

.container{
  position:relative;
  z-index:10;
  animation: fadeIn 2s ease-in-out;
  max-width:90%;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:38px;
}

p{
  font-size:20px;
}

button{
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  margin:15px;
  transition:0.3s;
}

.yes{
  background:white;
  color:#ff4b5c;
}

.yes:hover{
  transform:scale(1.1);
}

.no{
  background:transparent;
  border:2px solid white;
  color:white;
}

#answer{
  font-size:24px;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Sunle [ HIMMU ❤️ ]</h1>
  <p>
    Jab te tu meri zindagi me aayi se,
    sab kuch badhiya ho liya se.
    Teri hasi dekh ke din ban ja se.
    Ek baat puchni thi manne...
  </p>

  <h2>Ke tu meri zindagi ka hissa banegi?</h2>

  <button class="yes" onclick="showAnswer()">Haan</button>
  <button class="no" onclick="moveButton(this)">Na</button>

  <div id="answer"></div>
</div>

<script>
function showAnswer(){
  document.getElementById("answer").innerHTML =
  "Pakki baat se, main hamesha tera saath dunga.";
}

function moveButton(btn){
  btn.style.position="absolute";
  btn.style.top=Math.random()*window.innerHeight+"px";
  btn.style.left=Math.random()*window.innerWidth+"px";
}

/* Floating Hearts */
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
