<!DOCTYPE html>
<html>
<head>
<title>Ek Baat Sunle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff6a88,#ff99ac);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* Floating Hearts */
.heart{
  position:absolute;
  bottom:-50px;
  font-size:22px;
  animation: floatUp linear infinite;
}

@keyframes floatUp{
  0%{transform: translateY(0); opacity:1;}
  100%{transform: translateY(-100vh); opacity:0;}
}

.container{
  position:relative;
  z-index:10;
  max-width:90%;
}

h1{
  font-size:38px;
}

#typingText{
  font-size:20px;
  min-height:60px;
  margin-top:15px;
}

button{
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  margin:15px;
  transition:0.3s;
  display:none;
}

.yes{
  background:white;
  color:#ff4b5c;
}

.yes:hover{
  transform:scale(1.1);
}

.no{
  background:transparent;
  border:2px solid white;
  color:white;
}

#answer{
  font-size:24px;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Sunle [HIMMU❤️]</h1>
  <div id="typingText"></div>

  <h2 id="question" style="display:none;">
    Ke tu meri zindagi ka hissa banegi?
  </h2>

  <button class="yes" onclick="showAnswer()">Haan</button>
  <button class="no" onclick="moveButton(this)">Na</button>

  <div id="answer"></div>
</div>

<script>
const text = "Jab te tu meri zindagi me aayi se, sab kuch badhiya ho liya se. Teri hasi dekh ke din ban ja se. Ek baat puchni thi manne...";
let index = 0;

function typeEffect(){
  if(index < text.length){
    document.getElementById("typingText").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, 50);
  } else {
    document.getElementById("question").style.display="block";
    document.querySelector(".yes").style.display="inline-block";
    document.querySelector(".no").style.display="inline-block";
  }
}

window.onload = typeEffect;

function showAnswer(){
  document.getElementById("answer").innerHTML =
  "Pakki baat se, main hamesha tera saath dunga.";
}

function moveButton(btn){
  btn.style.position="absolute";
  btn.style.top=Math.random()*window.innerHeight+"px";
  btn.style.left=Math.random()*window.innerWidth+"px";
}

/* Floating Hearts */
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
