<!DOCTYPE html>
<html>
<head>
<title>For Someone Special</title>
<style>
body{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  color:#333;
}
.container{
  margin-top:100px;
}
h1{
  font-size:40px;
}
p{
  font-size:20px;
  width:70%;
  margin:auto;
}
button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background-color:#ff4b5c;
  color:white;
  cursor:pointer;
  margin-top:20px;
}
button:hover{
  background-color:#e8434f;
}
#answer{
  font-size:25px;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
  <h1>Hey [Uska Naam]</h1>
  <p>
    Jab se tum meri life me aayi ho, sab kuch special ho gaya hai.
    Tumhari smile meri sabse badi happiness hai.
    Main bas itna puchna chahta hoon...
  </p>

  <h2>Kya tum meri life ka permanent part banogi?</h2>

  <button onclick="showAnswer()">Yes</button>

  <div id="answer"></div>
</div>

<script>
function showAnswer(){
  document.getElementById("answer").innerHTML =
  "I promise main hamesha tumhe respect aur care dunga.";
}
</script>

</body>
</html>
